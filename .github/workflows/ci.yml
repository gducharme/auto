name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_applescript_tests:
        description: "Run AppleScript Safari integration tests on macOS"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .
          pip install black==26.1.0 ruff
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: black --check .
      - name: Run tests
        run: pytest -m "not integration and not applescript"

  applescript-integration:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_applescript_tests == 'true'
    runs-on: macos-latest
    env:
      RUN_APPLESCRIPT_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .
      - name: Run AppleScript integration tests
        run: pytest -m applescript
